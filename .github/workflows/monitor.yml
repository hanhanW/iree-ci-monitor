name: monitor

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect.py

      - name: Report
        run: python scripts/report.py

      - name: Commit & push
        run: |
          git config user.name "iree-ci-monitor[bot]"
          git config user.email "iree-ci-monitor[bot]@users.noreply.github.com"
          git add -A data README.md status.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "monitor: refresh $(TZ=America/Los_Angeles date '+%Y-%m-%dT%H:%M %Z')"
          git push
